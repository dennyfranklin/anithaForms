<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Details</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: #fff0f5;
    padding: 20px;
}

/* CONTAINER */
.container {
    max-width: 900px;
    margin: auto;
    background: white;
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

/* LAYOUT */
.product {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
}

.product img {
    width: 100%;
    max-width: 350px;
    border-radius: 10px;
}

.details {
    flex: 1;
}

.details h2 {
    margin-bottom: 10px;
}

.details p {
    color: #555;
    margin-bottom: 10px;
}

.price {
    font-size: 22px;
    color: #ff4e78;
    margin: 10px 0;
}

/* BUTTONS */
.btn {
    padding: 12px 20px;
    border: none;
    background: #ff6f91;
    color: white;
    border-radius: 6px;
    cursor: pointer;
    margin-right: 10px;
}

.btn:hover {
    background: #ff4e78;
}

.back {
    display: inline-block;
    margin-top: 15px;
    text-decoration: none;
    color: #555;
}

/* CART MESSAGE */
#message {
    margin-top: 15px;
    color: green;
    font-weight: bold;
}
</style>

</head>

<body>

<div class="container">
    <div class="product">
        <img src="https://via.placeholder.com/350" alt="Product">

        <div class="details">
            <h2>Glow Face Serum ✨</h2>
            <p>Our premium serum hydrates, brightens, and rejuvenates your skin using natural ingredients.</p>

            <p><strong>Benefits:</strong></p>
            <ul>
                <li>Deep hydration</li>
                <li>Natural glow</li>
                <li>Suitable for all skin types</li>
            </ul>

            <div class="price">₹799</div>

            <button class="btn" onclick="addToCart()">Add to Cart</button>
            <button class="btn" onclick="buyNow()">Buy Now</button>

            <div id="message"></div>

            <br>
            <a href="index.html" class="back">← Back to Home</a>
        </div>
    </div>
</div>

<script>
function addToCart() {
    document.getElementById("message").innerText = "✅ Product added to cart!";
}

function buyNow() {
    alert("Proceeding to checkout...");
}
</script>

</body>
</html>
